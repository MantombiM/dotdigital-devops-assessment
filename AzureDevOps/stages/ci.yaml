stages:
  - stage: CI
    displayName: Build, scan and package
    jobs:
      - job: ScanBuildPush
        displayName: Scan source, build image, scan image and push
        pool:
          vmImage: $(vmImage)
        steps:
          - task: trivy@2
            displayName: Trivy filesystem scan
            inputs:
              type: filesystem
              target: .
              scanners: vuln,misconfig,secret
              severity: HIGH,CRITICAL
              ignoreUnfixed: true
              exitCode: '1'

          - task: Docker@2
            displayName: Build image
            inputs:
              command: build
              containerRegistry: $(dockerRegistryServiceConnection)
              repository: $(imageRepository)
              dockerfile: $(dockerfilePath)
              tags: |
                $(Build.BuildId)

          - task: Docker@2
            displayName: Push image to ACR
            inputs:
              command: push
              containerRegistry: $(dockerRegistryServiceConnection)
              repository: $(imageRepository)
              tags: |
                $(Build.BuildId)

          - bash: |
              manifest_base_name="voteapp_$(Build.BuildId)_$(date +%Y%m%d%H%M%S)"
              echo "##vso[task.setvariable variable=manifestBaseName;isOutput=true]$manifest_base_name"
            name: setManifestName
            displayName: Generate manifest base name

      - job: GenerateManifest
        displayName: Stage deployment manifest
        dependsOn: ScanBuildPush
        pool:
          vmImage: $(vmImage)
        variables:
          manifestBaseName: $[ dependencies.ScanBuildPush.outputs['setManifestName.manifestBaseName'] ]
        steps:
          - task: CopyFiles@2
            displayName: Copy manifest to artifact staging directory
            inputs:
              SourceFolder: $(Build.SourcesDirectory)
              Contents: $(manifestPath)
              TargetFolder: $(Build.ArtifactStagingDirectory)
              flattenFolders: true

          - bash: |
              mv "$(Build.ArtifactStagingDirectory)/$(manifestPath)" "$(Build.ArtifactStagingDirectory)/$(manifestBaseName).yaml"
            displayName: Rename manifest file

          - publish: $(Build.ArtifactStagingDirectory)
            artifact: manifests
            displayName: Publish manifest artifact